<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Battle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #1a1a1a;
            border-bottom: 2px solid #2a2a2a;
            flex-shrink: 0;
        }

        .hud-player {
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 230px;
        }

        .hud-player.right {
            align-items: flex-end;
        }

        .hud-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .hud-name.p1 {
            color: #44ff88;
        }

        .hud-name.p2 {
            color: #ff4444;
        }

        .hp-track {
            width: 190px;
            height: 10px;
            background: #2a2a2a;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .hp-fill {
            height: 100%;
            border-radius: 5px;
            transition: width .25s ease;
        }

        .hp-fill.p1 {
            background: linear-gradient(90deg, #22aa55, #44ff88);
        }

        .hp-fill.p2 {
            background: linear-gradient(90deg, #aa2222, #ff4444);
        }

        .pwr-row {
            display: flex;
            gap: 3px;
            min-height: 18px;
            flex-wrap: wrap;
        }

        .pwr-row.right {
            justify-content: flex-end;
        }

        .pb {
            display: inline-flex;
            align-items: center;
            padding: 1px 5px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 700;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        #hud-center {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        #status {
            font-size: 17px;
            font-weight: 700;
            color: #f1c40f;
            letter-spacing: 3px;
        }

        .pause-btn {
            padding: 4px 12px;
            background: #252525;
            border: 1px solid #333;
            color: #aaa;
            cursor: pointer;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 1px;
            font-family: 'Segoe UI', sans-serif;
        }

        .pause-btn:hover {
            background: #333;
            color: #fff;
        }

        #settings {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 7px;
            background: #161616;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .cfg-box {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 9px 12px;
            min-width: 200px;
        }

        .cfg-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 7px;
            text-align: center;
        }

        .cfg-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .cfg-row:last-child {
            border-bottom: none;
        }

        .cfg-label {
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
        }

        .cfg-btn {
            padding: 3px 7px;
            background: #252525;
            border: 1px solid #2e2e2e;
            border-radius: 4px;
            color: #aaa;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            cursor: pointer;
            min-width: 95px;
            text-align: center;
            transition: all .15s;
            white-space: nowrap;
        }

        .cfg-btn:hover:not(.waiting):not(.err) {
            background: #303030;
            color: #fff;
            border-color: #444;
        }

        .cfg-btn.waiting {
            background: #2a1e00 !important;
            border-color: #f1c40f !important;
            color: #f1c40f !important;
            animation: pulse .55s infinite;
        }

        .cfg-btn.err {
            background: #2a0a0a !important;
            border-color: #ff5555 !important;
            color: #ff7777 !important;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .color-picker {
            border: none;
            background: none;
            width: 28px;
            height: 22px;
            cursor: pointer;
            border-radius: 3px;
        }

        .pwr-legend {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pleg {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            padding: 2px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .pleg:last-child {
            border-bottom: none;
        }

        #canvas-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            position: relative;
        }

        canvas {
            display: block;
            border: 3px solid #222;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            cursor: crosshair;
        }

        .ovl {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.86);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 18px;
        }

        .ovl.show {
            display: flex;
        }

        #win-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .ovl-btn {
            padding: 11px 30px;
            background: #f1c40f;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
        }

        .ovl-btn:hover {
            background: #f5d040;
        }

        .ovl-btn.sec {
            background: none;
            border: 1px solid #333;
            color: #777;
            margin-top: -8px;
        }

        .ovl-btn.sec:hover {
            color: #fff;
        }

        #toast {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0;
            transition: all .25s;
            z-index: 400;
            white-space: nowrap;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.ok {
            background: rgba(20, 120, 60, 0.95);
        }

        #toast.bad {
            background: rgba(180, 30, 30, 0.95);
        }

        #toast.pwr {
            background: rgba(100, 60, 180, 0.95);
        }
    </style>
</head>

<body>
    <div id="hud">
        <div class="hud-player">
            <div class="hud-name p1">PLAYER 1</div>
            <div class="hp-track">
                <div class="hp-fill p1" id="p1-hp"></div>
            </div>
            <div style="font-size:10px;color:#555;" id="p1-hp-text">100 HP</div>
            <div class="pwr-row" id="p1-pwrs"></div>
        </div>
        <div id="hud-center">
            <div id="status">TANK BATTLE</div>
            <button class="pause-btn" id="pause-btn" onclick="togglePause()">PAUSE (P)</button>
        </div>
        <div class="hud-player right">
            <div class="hud-name p2">PLAYER 2</div>
            <div class="hp-track">
                <div class="hp-fill p2" id="p2-hp"></div>
            </div>
            <div style="font-size:10px;color:#555;text-align:right;" id="p2-hp-text">100 HP</div>
            <div class="pwr-row right" id="p2-pwrs"></div>
        </div>
    </div>
    <div id="settings">
        <div class="cfg-box">
            <div class="cfg-title" style="color:#44ff88">P1 CONTROLS</div>
            <div class="cfg-row"><span class="cfg-label">SKIN</span><input type="color" id="p1-color"
                    class="color-picker" value="#44ff88"></div>
            <div class="cfg-row"><span class="cfg-label">UP</span><button class="cfg-btn" id="btn-p1-up"></button></div>
            <div class="cfg-row"><span class="cfg-label">DOWN</span><button class="cfg-btn" id="btn-p1-down"></button>
            </div>
            <div class="cfg-row"><span class="cfg-label">LEFT</span><button class="cfg-btn" id="btn-p1-left"></button>
            </div>
            <div class="cfg-row"><span class="cfg-label">RIGHT</span><button class="cfg-btn" id="btn-p1-right"></button>
            </div>
            <div class="cfg-row"><span class="cfg-label">FIRE</span><button class="cfg-btn" id="btn-p1-fire"></button>
            </div>
        </div>
        <div class="cfg-box">
            <div class="cfg-title" style="color:#ff4444">P2 CONTROLS</div>
            <div class="cfg-row"><span class="cfg-label">SKIN</span><input type="color" id="p2-color"
                    class="color-picker" value="#ff4444"></div>
            <div class="cfg-row"><span class="cfg-label">UP</span><button class="cfg-btn" id="btn-p2-up"></button></div>
            <div class="cfg-row"><span class="cfg-label">DOWN</span><button class="cfg-btn" id="btn-p2-down"></button>
            </div>
            <div class="cfg-row"><span class="cfg-label">LEFT</span><button class="cfg-btn" id="btn-p2-left"></button>
            </div>
            <div class="cfg-row"><span class="cfg-label">RIGHT</span><button class="cfg-btn" id="btn-p2-right"></button>
            </div>
            <div class="cfg-row"><span class="cfg-label">FIRE</span><button class="cfg-btn" id="btn-p2-fire"></button>
            </div>
        </div>
        <div class="cfg-box" style="min-width:160px;max-width:180px;">
            <div class="cfg-title" style="color:#cc88ff">POWER-UPS</div>
            <div class="pwr-legend">
                <div class="pleg"><span style="color:#ffcc44">⚡ Speed</span><span style="color:#555">Move faster</span>
                </div>
                <div class="pleg"><span style="color:#44aaff">🛡 Shield</span><span style="color:#555">Block 1
                        hit</span></div>
                <div class="pleg"><span style="color:#ff8844">🔥 Rapid</span><span style="color:#555">Fast fire</span>
                </div>
                <div class="pleg"><span style="color:#ff44ff">💥 Triple</span><span style="color:#555">3-way shot</span>
                </div>
                <div class="pleg"><span style="color:#44ff88">❤ Heal</span><span style="color:#555">+30 HP</span></div>
                <div class="pleg"><span style="color:#ff4444">☢ Nuke</span><span style="color:#555">40 damage burst</span>
                </div>
            </div>
        </div>
    </div>
    <div id="canvas-wrap">
        <canvas id="gc"></canvas>
        <div id="pause-ovl" class="ovl">
            <div style="font-size:46px;font-weight:700;color:#f1c40f;letter-spacing:4px;">PAUSED</div>
            <button class="ovl-btn" onclick="togglePause()">RESUME</button>
            <button class="ovl-btn sec" onclick="resetGame()">RESTART</button>
        </div>
        <div id="win-ovl" class="ovl">
            <div id="win-text">WINS!</div>
            <button class="ovl-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>
    <div id="toast"></div>
    <script>
        const canvas = document.getElementById('gc'), ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 400;
        function kId(e) { return 'k:' + e.code; }
        function mId(b) { return 'm:' + b; }
        const NAMES = { 'k:Space': 'Space', 'k:Enter': 'Enter', 'k:Escape': 'Esc', 'k:Backspace': 'Bksp', 'k:Tab': 'Tab', 'k:ShiftLeft': 'L.Shift', 'k:ShiftRight': 'R.Shift', 'k:ControlLeft': 'L.Ctrl', 'k:ControlRight': 'R.Ctrl', 'k:AltLeft': 'L.Alt', 'k:AltRight': 'R.Alt', 'k:ArrowUp': '↑ Up', 'k:ArrowDown': '↓ Down', 'k:ArrowLeft': '← Left', 'k:ArrowRight': '→ Right', 'k:KeyA': 'A', 'k:KeyB': 'B', 'k:KeyC': 'C', 'k:KeyD': 'D', 'k:KeyE': 'E', 'k:KeyF': 'F', 'k:KeyG': 'G', 'k:KeyH': 'H', 'k:KeyI': 'I', 'k:KeyJ': 'J', 'k:KeyK': 'K', 'k:KeyL': 'L', 'k:KeyM': 'M', 'k:KeyN': 'N', 'k:KeyO': 'O', 'k:KeyP': 'P', 'k:KeyQ': 'Q', 'k:KeyR': 'R', 'k:KeyS': 'S', 'k:KeyT': 'T', 'k:KeyU': 'U', 'k:KeyV': 'V', 'k:KeyW': 'W', 'k:KeyX': 'X', 'k:KeyY': 'Y', 'k:KeyZ': 'Z', 'k:Digit0': '0', 'k:Digit1': '1', 'k:Digit2': '2', 'k:Digit3': '3', 'k:Digit4': '4', 'k:Digit5': '5', 'k:Digit6': '6', 'k:Digit7': '7', 'k:Digit8': '8', 'k:Digit9': '9', 'k:Numpad0': 'Num0', 'k:Numpad1': 'Num1', 'k:Numpad2': 'Num2', 'k:Numpad3': 'Num3', 'k:Numpad4': 'Num4', 'k:Numpad5': 'Num5', 'k:Numpad6': 'Num6', 'k:Numpad7': 'Num7', 'k:Numpad8': 'Num8', 'k:Numpad9': 'Num9', 'k:NumpadEnter': 'Num↵', 'k:NumpadAdd': 'Num+', 'k:NumpadSubtract': 'Num-', 'k:NumpadMultiply': 'Num*', 'k:NumpadDivide': 'Num/', 'k:F1': 'F1', 'k:F2': 'F2', 'k:F3': 'F3', 'k:F4': 'F4', 'k:F5': 'F5', 'k:F6': 'F6', 'k:F7': 'F7', 'k:F8': 'F8', 'k:F9': 'F9', 'k:F10': 'F10', 'k:F11': 'F11', 'k:F12': 'F12', 'k:BracketLeft': '[', 'k:BracketRight': ']', 'k:Semicolon': ';', 'k:Quote': "'", 'k:Comma': ',', 'k:Period': '.', 'k:Slash': '/', 'k:Backslash': '\\', 'k:Minus': '-', 'k:Equal': '=', 'k:Backquote': '`', 'k:Home': 'Home', 'k:End': 'End', 'k:PageUp': 'PgUp', 'k:PageDown': 'PgDn', 'k:Insert': 'Ins', 'k:Delete': 'Del', 'm:0': 'Left Click', 'm:1': 'Mid Click', 'm:2': 'Right Click', 'm:3': 'MB4', 'm:4': 'MB5' };
        function dn(id) { return NAMES[id] || (id ? id.replace(/^[km]:/, '') : '?'); }

        // POWER DEFINITIONS
        const PDEFS = {
            speed: { icon: '⚡', label: 'SPEED', col: '#ffcc44', bg: 'rgba(255,200,50,0.2)', bc: '#ffcc44', dur: 300 },
            shield: { icon: '🛡', label: 'SHIELD', col: '#44aaff', bg: 'rgba(68,170,255,0.2)', bc: '#44aaff', dur: 0 },
            rapid: { icon: '🔥', label: 'RAPID', col: '#ff8844', bg: 'rgba(255,120,50,0.2)', bc: '#ff8844', dur: 240 },
            triple: { icon: '💥', label: 'TRIPLE', col: '#ff44ff', bg: 'rgba(255,68,255,0.2)', bc: '#ff44ff', dur: 300 },
            heal: { icon: '❤', label: 'HEAL', col: '#44ff88', bg: 'rgba(68,255,136,0.2)', bc: '#44ff88', dur: 0 },
            nuke: { icon: '☢', label: 'NUKE', col: '#ff4444', bg: 'rgba(255,68,68,0.2)', bc: '#ff4444', dur: 0 }
        };
        const PKEYS = Object.keys(PDEFS);

        const DEF = { p1: { up: 'k:KeyW', down: 'k:KeyS', left: 'k:KeyA', right: 'k:KeyD', fire: 'k:Space' }, p2: { up: 'k:ArrowUp', down: 'k:ArrowDown', left: 'k:ArrowLeft', right: 'k:ArrowRight', fire: 'k:Enter' } };
        const p1 = { id: 'p1', x: 80, y: 190, color: '#44ff88', hp: 100, maxHp: 100, lastDir: { x: 1, y: 0 }, fireCool: 0, keys: { ...DEF.p1 }, pw: { speed: 0, shield: false, rapid: 0, triple: 0 } };
        const p2 = { id: 'p2', x: 700, y: 190, color: '#ff4444', hp: 100, maxHp: 100, lastDir: { x: -1, y: 0 }, fireCool: 0, keys: { ...DEF.p2 }, pw: { speed: 0, shield: false, rapid: 0, triple: 0 } };
        let bullets = [], particles = [], pickups = [], gameActive = true, isPaused = false, frame = 0, pkTimer = 0;
        const SPD = 3.2, BSPD = 7, TS = 22, DMG = 20, FCOOL = 18;
        const WALLS = [{ x: 200, y: 100, w: 20, h: 120 }, { x: 580, y: 180, w: 20, h: 120 }, { x: 360, y: 50, w: 80, h: 20 }, { x: 360, y: 330, w: 80, h: 20 }, { x: 340, y: 160, w: 120, h: 80 }];
        const held = new Set();
        let RB = null;
        const SKIP = new Set(['MetaLeft', 'MetaRight', 'CapsLock']);

        function cancelRB() { if (!RB) return; RB.btn.classList.remove('waiting', 'err'); RB.btn.textContent = dn((RB.pid === 'p1' ? p1 : p2).keys[RB.action]); RB = null; }
        function tryBind(newId) {
            if (!RB) return;
            const { pid, action, btn } = RB, me = pid === 'p1' ? p1 : p2, other = pid === 'p1' ? p2 : p1;
            for (const [a, id] of Object.entries(me.keys)) { if (id === newId && a !== action) { btn.classList.remove('waiting'); btn.classList.add('err'); toast(`"${dn(newId)}" is YOUR ${a.toUpperCase()} already`, true); setTimeout(() => { if (RB && RB.btn === btn) { btn.classList.remove('err'); btn.classList.add('waiting'); } }, 700); return; } }
            for (const [a, id] of Object.entries(other.keys)) { if (id === newId) { btn.classList.remove('waiting'); btn.classList.add('err'); toast(`"${dn(newId)}" used by ${pid === 'p1' ? 'P2' : 'P1'} (${a.toUpperCase()})`, true); setTimeout(() => { if (RB && RB.btn === btn) { btn.classList.remove('err'); btn.classList.add('waiting'); } }, 700); return; } }
            me.keys[action] = newId; btn.classList.remove('waiting', 'err'); btn.textContent = dn(newId); toast(`${pid.toUpperCase()} ${action.toUpperCase()} → ${dn(newId)}`); RB = null; refreshBtns();
        }
        function refreshBtns() { ['up', 'down', 'left', 'right', 'fire'].forEach(a => ['p1', 'p2'].forEach(pid => { const b = document.getElementById('btn-' + pid + '-' + a); if (b && !b.classList.contains('waiting') && !b.classList.contains('err')) b.textContent = dn((pid === 'p1' ? p1 : p2).keys[a]); })); }
        ['up', 'down', 'left', 'right', 'fire'].forEach(action => ['p1', 'p2'].forEach(pid => { const btn = document.getElementById('btn-' + pid + '-' + action); if (!btn) return; btn.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); if (RB) { if (RB.btn === btn) { cancelRB(); return; } cancelRB(); } RB = { pid, action, btn }; btn.classList.add('waiting'); btn.textContent = 'Press key / click...'; }); }));
        window.addEventListener('keydown', e => { if (RB) { e.preventDefault(); e.stopPropagation(); if (SKIP.has(e.code)) return; tryBind(kId(e)); return; } if (e.code === 'KeyP') togglePause(); held.add(kId(e)); if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault(); }, true);
        window.addEventListener('keyup', e => { held.delete(kId(e)); }, true);
        window.addEventListener('mousedown', e => { if (e.target.classList.contains('cfg-btn')) return; if (RB) { e.preventDefault(); tryBind(mId(e.button)); return; } held.add(mId(e.button)); }, true);
        window.addEventListener('mouseup', e => { held.delete(mId(e.button)); }, true);
        window.addEventListener('contextmenu', e => { if (RB) e.preventDefault(); }, true);
        let _tt = null;
        function toast(msg, bad = false, pwr = false) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'show ' + (pwr ? 'pwr' : bad ? 'bad' : 'ok'); clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 2400); }
        document.getElementById('p1-color').addEventListener('input', e => { p1.color = e.target.value; });
        document.getElementById('p2-color').addEventListener('input', e => { p2.color = e.target.value; });
        function togglePause() { if (!gameActive) return; if (RB) cancelRB(); isPaused = !isPaused; document.getElementById('pause-ovl').classList.toggle('show', isPaused); document.getElementById('pause-btn').textContent = isPaused ? 'RESUME (P)' : 'PAUSE (P)'; }
        function ov(ax, ay, aw, ah, bx, by, bw, bh) { return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by; }
        function blocked(nx, ny) { if (nx < 0 || nx > canvas.width - TS || ny < 0 || ny > canvas.height - TS) return true; for (const w of WALLS) if (ov(nx, ny, TS, TS, w.x, w.y, w.w, w.h)) return true; return false; }
        function sparks(x, y, col, n) { for (let i = 0; i < n; i++) { const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 4; particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, col, r: 1.5 + Math.random() * 3 }); } }

        function spawnPickup() {
            if (pickups.length >= 3) return;
            let tries = 0, px, py;
            do { px = 50 + Math.random() * 700; py = 30 + Math.random() * 340; tries++; }
            while (tries < 30 && (WALLS.some(w => ov(px - 14, py - 14, 28, 28, w.x, w.y, w.w, w.h)) || pickups.some(p => Math.hypot(p.x - px, p.y - py) < 55)));
            pickups.push({ x: px, y: py, type: PKEYS[Math.floor(Math.random() * PKEYS.length)], t: Math.random() * Math.PI * 2 });
        }

        function applyPwr(player, type) {
            const d = PDEFS[type], pn = player.id === 'p1' ? 'P1' : 'P2';
            if (type === 'speed') player.pw.speed = d.dur;
            else if (type === 'shield') player.pw.shield = true;
            else if (type === 'rapid') player.pw.rapid = d.dur;
            else if (type === 'triple') player.pw.triple = d.dur;
            else if (type === 'heal') { player.hp = Math.min(player.maxHp, player.hp + 30); }
            else if (type === 'nuke') {
                const opp = player === p1 ? p2 : p1;
                if (opp.pw.shield) { opp.pw.shield = false; toast(`${pn} Nuke blocked by Shield!`, false, true); }
                else { opp.hp = Math.max(0, opp.hp - 40); sparks(opp.x + TS / 2, opp.y + TS / 2, '#ff4444', 22); if (opp.hp <= 0) endGame(player.id); }
            }
            toast(`${pn} got ${d.icon} ${d.label}!`, false, true);
            refreshPwrHUD();
        }

        function refreshPwrHUD() {
            [p1, p2].forEach(t => {
                const el = document.getElementById(t.id + '-pwrs'); el.innerHTML = '';
                const add = (def, timer) => { const b = document.createElement('span'); b.className = 'pb'; b.style.background = def.bg; b.style.borderColor = def.bc; b.style.color = def.col; b.textContent = def.icon + ' ' + def.label + (timer ? ' ' + Math.ceil(timer / 60) + 's' : ''); el.appendChild(b); };
                if (t.pw.speed > 0) add(PDEFS.speed, t.pw.speed);
                if (t.pw.shield) add(PDEFS.shield, 0);
                if (t.pw.rapid > 0) add(PDEFS.rapid, t.pw.rapid);
                if (t.pw.triple > 0) add(PDEFS.triple, t.pw.triple);
            });
        }

        function processInput(t) {
            if (isPaused || !gameActive) return;
            let mx = 0, my = 0;
            if (held.has(t.keys.up)) { my = -1; t.lastDir = { x: 0, y: -1 }; } else if (held.has(t.keys.down)) { my = 1; t.lastDir = { x: 0, y: 1 }; }
            if (held.has(t.keys.left)) { mx = -1; if (!my) t.lastDir = { x: -1, y: 0 }; } else if (held.has(t.keys.right)) { mx = 1; if (!my) t.lastDir = { x: 1, y: 0 }; }
            if (mx && my) { mx *= 0.707; my *= 0.707; }
            const spd = SPD * (t.pw.speed > 0 ? 1.65 : 1);
            if (!blocked(t.x + mx * spd, t.y)) t.x += mx * spd;
            if (!blocked(t.x, t.y + my * spd)) t.y += my * spd;
            if (t.pw.speed > 0) { t.pw.speed--; if (t.pw.speed === 0) refreshPwrHUD(); }
            if (t.pw.rapid > 0) { t.pw.rapid--; if (t.pw.rapid === 0) refreshPwrHUD(); }
            if (t.pw.triple > 0) { t.pw.triple--; if (t.pw.triple === 0) refreshPwrHUD(); }
            if (t.fireCool > 0) t.fireCool--;
            const cool = t.pw.rapid > 0 ? Math.floor(FCOOL / 3) : FCOOL;
            if (held.has(t.keys.fire) && t.fireCool === 0) {
                const hs = TS / 2, sx = t.x + hs + t.lastDir.x * (hs + 4), sy = t.y + hs + t.lastDir.y * (hs + 4);
                let ok = true; for (const w of WALLS) if (ov(sx - 2, sy - 2, 4, 4, w.x, w.y, w.w, w.h)) { ok = false; break; }
                if (ok) {
                    const dirs = [t.lastDir];
                    if (t.pw.triple > 0) { const perp = { x: -t.lastDir.y, y: t.lastDir.x }; dirs.push(perp, { x: -perp.x, y: -perp.y }); }
                    dirs.forEach((d, idx) => { bullets.push({ x: sx, y: sy, vx: d.x * BSPD, vy: d.y * BSPD, owner: t, life: 90, r: 4, side: idx > 0 }); });
                    t.fireCool = cool;
                }
            }
            for (let i = pickups.length - 1; i >= 0; i--) {
                const pk = pickups[i];
                if (ov(t.x, t.y, TS, TS, pk.x - 13, pk.y - 13, 26, 26)) { applyPwr(t, pk.type); sparks(pk.x, pk.y, PDEFS[pk.type].col, 14); pickups.splice(i, 1); }
            }
        }

        function drawBg() { ctx.fillStyle = '#1e2228'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1; for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); } for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); } }
        function drawWalls() { WALLS.forEach(w => { const g = ctx.createLinearGradient(w.x, w.y, w.x + w.w, w.y + w.h); g.addColorStop(0, '#3a3a3a'); g.addColorStop(1, '#252525'); ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(w.x, w.y, w.w, w.h, 3); ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.roundRect(w.x, w.y, w.w, w.h, 3); ctx.stroke(); }); }
        function shade(hex, a) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return '#' + [r, g, b].map(v => Math.max(0, Math.min(255, v + a)).toString(16).padStart(2, '0')).join(''); }

        function drawTank(t) {
            const x = t.x, y = t.y, s = TS, hs = s / 2, cx = x + hs, cy = y + hs;
            if (t.pw.shield) { const p2 = 0.5 + 0.5 * Math.sin(frame * 0.1); ctx.save(); ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 10 + p2 * 8; ctx.beginPath(); ctx.arc(cx, cy, s * 0.85, 0, Math.PI * 2); ctx.strokeStyle = `rgba(68,170,255,${0.55 + p2 * 0.35})`; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = `rgba(68,170,255,${0.08 + p2 * 0.08})`; ctx.fill(); ctx.restore(); }
            if (t.pw.speed > 0) { const d = t.lastDir; ctx.beginPath(); ctx.arc(cx - d.x * s * 0.5, cy - d.y * s * 0.5, s * 0.28, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,200,50,0.18)'; ctx.fill(); }
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x + 3, y + 4, s, s);
            const bg = ctx.createLinearGradient(x, y, x + s, y + s); bg.addColorStop(0, t.color); bg.addColorStop(1, shade(t.color, -40));
            ctx.fillStyle = bg; ctx.beginPath(); ctx.roundRect(x, y, s, s, 4); ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5;
            const d = t.lastDir;
            if (Math.abs(d.x) > Math.abs(d.y)) { for (let i = 4; i < s; i += 5) { ctx.beginPath(); ctx.moveTo(x + i, y + 2); ctx.lineTo(x + i, y + s - 2); ctx.stroke(); } }
            else { for (let i = 4; i < s; i += 5) { ctx.beginPath(); ctx.moveTo(x + 2, y + i); ctx.lineTo(x + s - 2, y + i); ctx.stroke(); } }
            ctx.fillStyle = shade(t.color, -40); ctx.save(); ctx.translate(cx, cy); ctx.rotate(Math.atan2(d.y, d.x)); ctx.fillRect(hs * 0.3, -2, 14, 4); ctx.restore();
            ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fillStyle = t.color; ctx.fill();
            const hr = t.hp / t.maxHp; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(x, y - 8, s, 4);
            ctx.fillStyle = hr > 0.5 ? '#44ff88' : hr > 0.25 ? '#f1c40f' : '#ff4444'; ctx.fillRect(x, y - 8, s * hr, 4);
        }

        function drawPickups() {
            pickups.forEach(pk => {
                pk.t += 0.07;
                const def = PDEFS[pk.type], pulse = 0.5 + 0.5 * Math.sin(pk.t), r = 11 + pulse * 3;
                ctx.save(); ctx.shadowColor = def.col; ctx.shadowBlur = 10 + pulse * 8;
                ctx.beginPath(); ctx.arc(pk.x, pk.y, r, 0, Math.PI * 2);
                ctx.fillStyle = def.bg; ctx.fill();
                ctx.strokeStyle = def.col; ctx.lineWidth = 1.5 + pulse; ctx.stroke();
                ctx.restore();
                ctx.font = `${12 + pulse * 2}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(def.icon, pk.x, pk.y);
            });
        }

        function loop() {
            frame++; drawBg(); drawWalls(); drawPickups();
            if (!isPaused && gameActive) {
                processInput(p1); processInput(p2);
                pkTimer++; if (pkTimer >= 420) { pkTimer = 0; spawnPickup(); }
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
                    for (const w of WALLS) { if (ov(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2, w.x, w.y, w.w, w.h)) { const px = b.x - b.vx; (px + b.r <= w.x || px - b.r >= w.x + w.w) ? b.vx = -b.vx : b.vy = -b.vy; b.life -= 20; sparks(b.x, b.y, '#aaa', 4); break; } }
                    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) { bullets.splice(i, 1); continue; }
                    if (b.life <= 0) { sparks(b.x, b.y, '#f1c40f', 6); bullets.splice(i, 1); continue; }
                    const opp = b.owner === p1 ? p2 : p1;
                    if (ov(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2, opp.x, opp.y, TS, TS)) {
                        if (opp.pw.shield) { opp.pw.shield = false; sparks(b.x, b.y, '#44aaff', 10); toast(`${opp.id === 'p1' ? 'P1' : 'P2'} Shield blocked!`, false, true); refreshPwrHUD(); }
                        else { opp.hp = Math.max(0, opp.hp - DMG); sparks(b.x, b.y, opp.color, 12); if (opp.hp <= 0) endGame(b.owner.id); }
                        bullets.splice(i, 1); continue;
                    }
                    ctx.save(); ctx.shadowColor = b.side ? '#ff44ff' : '#f1c40f'; ctx.shadowBlur = 8;
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fillStyle = b.side ? 'rgba(255,100,255,0.9)' : 'rgba(255,220,60,0.9)'; ctx.fill(); ctx.restore();
                }
                for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.88; p.vy *= 0.88; p.life -= 0.05; if (p.life <= 0) { particles.splice(i, 1); continue; } ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fillStyle = p.col; ctx.fill(); ctx.globalAlpha = 1; }
            }
            drawTank(p1); drawTank(p2);
            [p1, p2].forEach((t, i) => { const hp = Math.max(0, t.hp); document.getElementById('p' + (i + 1) + '-hp').style.width = hp + '%'; document.getElementById('p' + (i + 1) + '-hp-text').textContent = hp + ' HP'; });
            requestAnimationFrame(loop);
        }

        function endGame(wid) { gameActive = false; document.getElementById('win-text').textContent = wid.toUpperCase() + ' WINS!'; document.getElementById('win-text').style.color = wid === 'p1' ? p1.color : p2.color; document.getElementById('win-ovl').classList.add('show'); }
        function resetGame() { p1.hp = 100; p2.hp = 100; p1.x = 80; p1.y = 190; p1.lastDir = { x: 1, y: 0 }; p1.fireCool = 0; p1.pw = { speed: 0, shield: false, rapid: 0, triple: 0 }; p2.x = 700; p2.y = 190; p2.lastDir = { x: -1, y: 0 }; p2.fireCool = 0; p2.pw = { speed: 0, shield: false, rapid: 0, triple: 0 }; bullets = []; particles = []; pickups = []; pkTimer = 0; gameActive = true; isPaused = false; frame = 0; document.getElementById('win-ovl').classList.remove('show'); document.getElementById('pause-ovl').classList.remove('show'); document.getElementById('pause-btn').textContent = 'PAUSE (P)'; refreshPwrHUD(); }
        refreshBtns(); refreshPwrHUD(); loop();
    </script>
</body>
